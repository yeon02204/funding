server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/funding?serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

jwt:
  secret: "CHANGE_ME_TO_LONG_RANDOM_SECRET_MIN_32CHARS"
  access-token-exp-minutes: 60

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE