server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/funding?serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

  sql:
    init:
      mode: never

  mail:
    host: smtp.gmail.com
    port: 587
    username: yeon02204@gmail.com     #  정연 Gmail 주소
    password: pvsq ugwi wwhy jmzv      # Gmail 앱 funding 비밀번호 (계정 비밀번호 X)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

jwt:
  secret: "CHANGE_ME_TO_LONG_RANDOM_SECRET_MIN_32CHARS"
  access-token-exp-minutes: 60

app:
  frontend-url: http://localhost:3000  #  배포 시 실제 URL로 변경

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
