server:
  port: 8080

spring:

  # ──────────────────────────────────────────────────────────────
  # [해빈님에게]
  # 현재는 MySQL 없는 환경에서 테스트용으로 H2 인메모리 DB를 사용 중이에요.
  # MySQL 연결할 준비가 되면:
  #   1. 아래 H2 datasource 블록 전체를 주석 처리
  #   2. MySQL datasource 블록 주석 해제
  #   3. jpa.hibernate.ddl-auto 를 none 으로 변경
  #   4. h2.console 블록 삭제 또는 주석 처리
  # ──────────────────────────────────────────────────────────────

  # ✅ 현재 사용 중 (H2 인메모리 - 로컬 테스트용)
  datasource:
    url: jdbc:h2:mem:funding;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ⛔ MySQL 연결 시 아래 주석 해제 (H2 블록은 주석 처리할 것)
  # datasource:
  #   url: jdbc:mysql://localhost:3306/funding?serverTimezone=Asia/Seoul&characterEncoding=utf8
  #   username: root
  #   password: root1234
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console 에서 DB 직접 확인 가능 (MySQL 전환 시 삭제)

  jpa:
    hibernate:
      ddl-auto: create-drop   # H2용 - MySQL 전환 시 none 으로 변경할 것
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

jwt:
  secret: "CHANGE_ME_TO_LONG_RANDOM_SECRET_MIN_32CHARS"
  access-token-exp-minutes: 60

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE